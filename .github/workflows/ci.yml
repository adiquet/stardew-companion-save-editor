name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: |
          npx tsc --noEmit -p packages/core
          npx tsc --noEmit -p packages/server
          npx tsc --noEmit -p packages/ui
      - name: Tests
        run: npm test
      - name: Build UI
        run: npm run build -w @sdvse/ui
